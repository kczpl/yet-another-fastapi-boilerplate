# Public schema migrations.
# Usage: uv run alembic -c alembic/alembic.ini upgrade head
#        uv run alembic -c alembic/alembic.ini revision -m "create items table"
# DATABASE_URL (env) overrides sqlalchemy.url below — see alembic/env.py.

[alembic]
script_location = %(here)s
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s
prepend_sys_path = %(here)s/..
version_locations = %(here)s/versions
sqlalchemy.url = postgresql+psycopg://app:app@localhost:5432/app

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
